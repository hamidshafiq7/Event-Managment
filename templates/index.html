<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Planning & Operations Management</title>
    <style>
        :root {
            --primary-light: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-dark: #1e3a8a;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --surface: #ffffff;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            padding: 40px 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Graphic Header Components */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-100);
        }

        .header-title-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: var(--surface);
            stroke-width: 2;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--primary-700), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-badge {
            background-color: var(--primary-light);
            color: var(--primary-700);
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--primary-200);
        }

        /* Component Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            margin-bottom: 35px;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(to right, var(--primary-light), transparent);
            padding: 20px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Form Layout Elements */
        form {
            padding: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 11px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--surface);
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            color: var(--surface);
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15);
        }

        button:hover {
            background: linear-gradient(135deg, var(--primary-700), var(--primary-dark));
            box-shadow: 0 6px 14px rgba(37, 99, 235, 0.25);
            transform: translateY(-1px);
        }

        /* Data Matrix Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background-color: var(--primary-light);
            color: var(--primary-dark);
            font-weight: 700;
            padding: 16px 24px;
            border-bottom: 2px solid var(--primary-200);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        td {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(239, 246, 255, 0.4);
        }

        /* Semantic View Elements */
        .id-badge {
            background-color: var(--border);
            color: var(--text-muted);
            padding: 4px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .event-title-main {
            font-weight: 600;
            color: var(--text-main);
            display: block;
        }

        .type-tag {
            background-color: var(--primary-light);
            color: var(--primary-700);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        .date-display {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .price-metric {
            font-family: system-ui, monospace;
            font-weight: 700;
            color: var(--primary-700);
            font-size: 1.05rem;
            text-align: right;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        
        <header>
            <div class="header-title-area">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h1>Event Planning & Operations Management</h1>
            </div>
            <span class="system-badge">Relational Core Cluster v1.0</span>
        </header>

        <div class="card">
            <div class="card-header">
                <h3>Book New Operational Event</h3>
            </div>
            <form action="/add_event" method="POST">
                <div class="form-grid">
                    <div class="field-group">
                        <label>Event Title</label>
                        <input type="text" name="title" placeholder="e.g. Corporate Gala" required>
                    </div>
                    <div class="field-group">
                        <label>Classification</label>
                        <input type="text" name="type" placeholder="e.g. Corporate, Wedding" required>
                    </div>
                    <div class="field-group">
                        <label>Start Boundary (Date/Time)</label>
                        <input type="datetime-local" name="start" required>
                    </div>
                    <div class="field-group">
                        <label>End Boundary (Date/Time)</label>
                        <input type="datetime-local" name="end" required>
                    </div>
                    <div class="field-group">
                        <label>Assigned Venue Location</label>
                        <select name="venue" required>
                            <option value="1">Royal Palm Banquet Hall</option>
                            <option value="2">Crystal Marquee</option>
                            <option value="3">Elegance Garden</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label>Lead Coordinator</label>
                        <select name="organizer" required>
                            <option value="1">Malik Hamid</option>
                            <option value="2">Haris Yasin</option>
                        </select>
                    </div>
                </div>
                <button type="submit">Commit Event Transaction</button>
            </form>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Active Operations Catalog</h3>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 70px;">ID</th>
                            <th>Event Specification</th>
                            <th>Classification</th>
                            <th>Lead Coordinator</th>
                            <th>Assigned Venue Location</th>
                            <th>Scheduled Execution</th>
                            <th style="
